name: 賽程爬蟲排程

on:
  schedule:
    # 每日 00:00 台灣時間（UTC 16:00）- 一般賽程爬蟲
    - cron: '0 16 * * *'
    # 賽前高頻：台灣時間 17:00 / 18:00 / 19:00（UTC 9/10/11）- 先發名單 + 啦啦隊
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
  # 允許手動觸發
  workflow_dispatch:
    inputs:
      league:
        description: '指定聯賽（cpbl / tpbl / plg，留空執行全部）'
        required: false
        default: ''

jobs:
  crawl:
    name: 執行爬蟲
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安裝依賴
        run: npm ci

      - name: 執行賽程爬蟲（部分失敗不中斷）
        id: crawl
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          LEAGUE="${{ github.event.inputs.league }}"
          if [ -n "$LEAGUE" ]; then
            echo "執行指定聯賽：$LEAGUE"
            node src/index.js $LEAGUE || true
          else
            echo "執行全部聯賽（逐一執行，失敗不中斷）"
            node src/cpbl.js || echo "⚠️ CPBL 爬蟲失敗（可能被 IP 封鎖，將使用已提交的快取資料）"
            node src/tpbl.js || echo "⚠️ TPBL 爬蟲失敗"
            node src/plg.js  || echo "⚠️ PLG 爬蟲失敗"
          fi

      # 啦啦隊班表：CPBL 官網為 JS 渲染，自動爬蟲無法取得，改為人工維護 cheerleader.json
      # - name: 執行啦啦隊班表爬蟲（已停用）

      - name: 合併 _headers 與靜態資料
        run: |
          cp _headers data/_headers
          # 若 CPBL 未更新（被封鎖），使用 git 快取版本
          if [ ! -f data/cpbl.json ]; then
            echo "⚠️ cpbl.json 不存在，從 git 暫存區恢復"
            git show HEAD:data/cpbl.json > data/cpbl.json 2>/dev/null || echo '{"league":"cpbl","sport_type":"baseball","updated_at":"'"$(date -u +%Y-%m-%dT%H:%M:%S+08:00)"'","games":[]}' > data/cpbl.json
          fi
          # 確保靜態資料檔案存在（venue_info / cheer_guide / food_guide / cheerleader）
          for f in venue_info cheer_guide food_guide cheerleader; do
            if [ ! -f "data/${f}.json" ]; then
              git show HEAD:data/${f}.json > data/${f}.json 2>/dev/null || echo '{}' > data/${f}.json
            fi
          done

      - name: Schema 驗證
        run: node verify-schema.js

      - name: 部署至 Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy data --project-name=taiwan-sports-data --branch=main

      - name: 通知成功
        if: success()
        run: echo "✅ 爬蟲與部署成功完成"

      - name: 爬蟲失敗通知
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            curl -s -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"content\":\"🚨 GitHub Actions 爬蟲 Workflow 失敗\\n時間：$(date '+%Y-%m-%d %H:%M:%S') UTC\"}"
          else
            echo "WEBHOOK_URL 未設定，略過通知"
          fi
